<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2130;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111015;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGlow" cx="25%" cy="50%">
      <stop offset="0%" style="stop-color:#ad5d42;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#d7a861;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d7a861;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="300" cy="315" r="400" fill="url(#accentGlow)"/>
  
  <!-- Decorative elements -->
  <line x1="100" y1="140" x2="280" y2="140" stroke="#d7a861" stroke-width="3" opacity="0.6"/>
  <circle cx="115" cy="140" r="8" fill="#d7a861" opacity="0.8"/>
  
  <!-- Text content -->
  <text x="100" y="200" font-family="Georgia, serif" font-size="26" fill="#d7a861" letter-spacing="3">
    KHLOE GRACE EDITORIAL SERIES
  </text>
  
  <text x="100" y="290" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#f9f4ea">
    American Idol
  </text>
  
  <text x="100" y="360" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#f9f4ea">
    Journey
  </text>
  
  <text x="100" y="440" font-family="Arial, sans-serif" font-size="32" fill="#d7cdbb" opacity="0.9">
    Performance dynamics, song choices,
  </text>
  
  <text x="100" y="490" font-family="Arial, sans-serif" font-size="32" fill="#d7cdbb" opacity="0.9">
    and audience impact analysis
  </text>
  
  <!-- Footer -->
  <text x="1050" y="580" font-family="Arial, sans-serif" font-size="20" fill="#d7a861" text-anchor="end" opacity="0.8">
    KhloeGrace.com
  </text>
