<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2130;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111015;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="accentGlow" cx="80%" cy="40%">
      <stop offset="0%" style="stop-color:#d7a861;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#d7a861;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d7a861;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="960" cy="252" r="350" fill="url(#accentGlow)"/>
  
  <!-- Decorative elements -->
  <line x1="100" y1="520" x2="450" y2="520" stroke="#d7a861" stroke-width="3" opacity="0.7"/>
  <rect x="100" y="100" width="6" height="80" fill="#d7a861" opacity="0.6"/>
  
  <!-- Text content -->
  <text x="130" y="150" font-family="Georgia, serif" font-size="26" fill="#d7a861" letter-spacing="3">
    KHLOE GRACE EDITORIAL SERIES
  </text>
  
  <text x="130" y="260" font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#f9f4ea">
    Biography
  </text>
  
  <text x="130" y="350" font-family="Arial, sans-serif" font-size="34" fill="#d7cdbb" opacity="0.95">
    Artist profile, musical foundations,
  </text>
  
  <text x="130" y="400" font-family="Arial, sans-serif" font-size="34" fill="#d7cdbb" opacity="0.95">
    performance identity, and editorial outlook
  </text>
  
  <!-- Footer -->
  <text x="130" y="560" font-family="Arial, sans-serif" font-size="22" fill="#d7a861" opacity="0.8">
    KhloeGrace.com
  </text>
</svg>
